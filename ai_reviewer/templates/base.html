{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Reviewer Hub{% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #222;
        }

        nav {
            background: #1e3a8a;
            padding: 15px 30px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }

        .main-content {
            padding: 30px;
        }

        .btn {
            background: #2563eb;
            color: white;
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

    <nav>
        <a href="/">Home</a>
        <a href="/dashboard/">Dashboard</a>
        <a href="/submit-code/">Submit Code</a>
        <a href="/review-history/">History</a>
        {% if user.is_authenticated %}
            <a href="/logout/">Logout</a>
        {% else %}
            <a href="/login/">Login</a>
            <a href="/register/">Register</a>
        {% endif %}
    </nav>

    <div class="main-content">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
